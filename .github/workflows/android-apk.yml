name: Build Android APK
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'HealthPro-Moie-Zdorovia/package-lock.json'

      - name: Install dependencies
        working-directory: HealthPro-Moie-Zdorovia
        run: npm install

      - name: Check what installed
        working-directory: HealthPro-Moie-Zdorovia
        run: |
          ls -la
          cat package.json
          npx vite --version

      - name: Build web app
        working-directory: HealthPro-Moie-Zdorovia
        run: npm run build

      - name: Check dist exists
        run: ls -la HealthPro-Moie-Zdorovia/

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@8.3.1

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthPro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
